<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rushmore — Project Map</title>
<style>
  :root{
    --navy:#16324f; --navy2:#1d456b; --ink:#1f2a37; --muted:#6b7785; --line:#e3e8ee;
    --bg:#eef2f6; --card:#fff;
    --done:#1D9E75; --doneBg:#e7f6f0;
    --doing:#E0922F; --doingBg:#fcf2e3;
    --todo:#9aa3ad; --todoBg:#f1f3f6;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);height:100%;display:flex;flex-direction:column}
  header{background:var(--navy);color:#fff;padding:11px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;flex:0 0 auto}
  header h1{font-size:16px;margin:0;font-weight:800}
  header .tag{font-size:10px;font-weight:700;background:rgba(255,255,255,.16);padding:3px 8px;border-radius:999px;letter-spacing:.5px}
  .grow{flex:1}
  .legend{display:flex;gap:13px;align-items:center;font-size:12px;color:#cfe0f0}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .dot.done{background:var(--done)} .dot.doing{background:var(--doing)} .dot.todo{background:var(--todo)}
  .hbtn{background:rgba(255,255,255,.12);color:#fff;border:0;border-radius:8px;padding:7px 11px;font-size:12px;font-weight:600;cursor:pointer}
  .hbtn:hover{background:rgba(255,255,255,.22)}
  .wrap{flex:1;display:flex;min-height:0}
  .stage{position:relative;overflow:auto;flex:1;min-width:0}
  .canvas{position:relative;transform-origin:0 0}
  .zone{position:absolute;z-index:0;border-radius:16px;border:1.5px dashed;pointer-events:none}
  .zlabel{position:absolute;top:-11px;left:14px;font-size:11px;font-weight:800;letter-spacing:.4px;padding:3px 10px;border-radius:999px;color:#fff;white-space:nowrap}
  svg.edges{position:absolute;left:0;top:0;pointer-events:none;z-index:1;overflow:visible}
  .edges text{font-size:11px;font-style:italic;font-weight:600}
  .node{position:absolute;z-index:2;background:var(--card);border:2px solid var(--line);border-radius:12px;
        padding:10px 12px;cursor:pointer;box-shadow:0 2px 6px rgba(20,50,79,.10);transition:box-shadow .12s,transform .05s;user-select:none;width:215px}
  .node:hover{box-shadow:0 6px 16px rgba(20,50,79,.18)}
  .node.hl{box-shadow:0 0 0 3px rgba(29,69,107,.35),0 8px 20px rgba(20,50,79,.22)}
  .node.dragging{cursor:grabbing;box-shadow:0 10px 26px rgba(20,50,79,.28);z-index:5}
  .node .ntitle{font-weight:800;font-size:14px;line-height:1.2;display:flex;align-items:flex-start;gap:7px}
  .node .ndept{font-size:10.5px;font-weight:700;margin-top:5px;letter-spacing:.2px}
  .node .nprog{font-size:10.5px;color:var(--muted);margin-top:6px;font-weight:600;display:flex;align-items:center;gap:7px}
  .node .pbar{flex:1;height:5px;background:#eef1f5;border-radius:99px;overflow:hidden}
  .node .pbar i{display:block;height:100%}
  .node.s-done{border-color:var(--done)} .node.s-done .pbar i{background:var(--done)}
  .node.s-doing{border-color:var(--doing)} .node.s-doing .pbar i{background:var(--doing)}
  .node.s-todo{border-color:#cdd5de} .node.s-todo .pbar i{background:var(--todo)}
  .sdot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;margin-top:4px}
  .sdot.done{background:var(--done)} .sdot.doing{background:var(--doing)} .sdot.todo{background:var(--todo)}

  /* sidebar */
  .side{flex:0 0 350px;max-width:80vw;background:#fff;border-left:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
  .sidehd{padding:14px 16px;border-bottom:1px solid var(--line);background:#f8fafc}
  .sidehd .t{font-size:13px;font-weight:800;letter-spacing:.3px;color:var(--navy)}
  .ovbar{height:8px;background:#eef1f5;border-radius:99px;overflow:hidden;margin:9px 0 7px}
  .ovbar i{display:block;height:100%;background:var(--done);width:0%}
  .ovpct{font-size:12px;color:var(--muted);font-weight:600}
  .nextup{margin-top:10px;background:#eef5ff;border:1px solid #d4e4fb;border-radius:9px;padding:9px 11px;font-size:12px;line-height:1.35}
  .nextup b{color:#1b4f8a}
  .nextup .ns{display:block;color:var(--muted);font-size:11px;margin-top:2px}
  .sidebody{overflow:auto;flex:1;padding:8px 10px}
  .step{border:1px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden}
  .step.cur{border-color:var(--navy2);box-shadow:0 0 0 2px rgba(29,69,107,.12)}
  .stephd{display:flex;align-items:center;gap:8px;padding:9px 11px;cursor:pointer;background:#fff}
  .stephd:hover{background:#f7f9fc}
  .stephd .stt{flex:1;font-size:13px;font-weight:700;line-height:1.2}
  .stephd .scount{font-size:11px;font-weight:700;color:var(--muted)}
  .stephd .chev{color:#b6c0cc;font-size:11px;transition:transform .15s}
  .step.open .chev{transform:rotate(90deg)}
  .steptasks{display:none;padding:4px 11px 11px;border-top:1px solid var(--line);background:#fcfdfe}
  .step.open .steptasks{display:block}
  .smeta{font-size:11px;color:var(--muted);margin:8px 0 9px;line-height:1.4}
  .smeta b{color:#4a5663}
  .task{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:12.5px;line-height:1.35}
  .tk{flex:0 0 auto;width:16px;height:16px;border-radius:5px;border:1.6px solid #cbd3dc;background:#fff;cursor:pointer;margin-top:1px;position:relative}
  .tk.done{background:var(--done);border-color:var(--done)}
  .tk.done:after{content:"✓";color:#fff;font-size:11px;font-weight:800;position:absolute;left:2px;top:-1px}
  .tk.doing{background:var(--doingBg);border-color:var(--doing)}
  .tk.doing:after{content:"";position:absolute;left:4px;top:4px;width:6px;height:6px;border-radius:50%;background:var(--doing)}
  .task .tt{flex:1}
  .task.tdone .tt{color:#9aa6b1;text-decoration:line-through}
  .task .del{border:0;background:none;color:#cfd6de;cursor:pointer;font-size:14px;line-height:1;padding:0 2px}
  .task .del:hover{color:#e15b5b}
  .addt{display:flex;gap:6px;margin-top:8px}
  .addt input{flex:1;border:1.5px solid var(--line);border-radius:8px;padding:6px 8px;font:inherit;font-size:12px}
  .addt input:focus{outline:none;border-color:var(--navy2)}
  .addt button{border:0;background:var(--navy2);color:#fff;border-radius:8px;padding:0 11px;font-size:12px;font-weight:700;cursor:pointer}
  .zoombar{position:absolute;left:12px;bottom:12px;z-index:6;display:flex;gap:6px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:5px;box-shadow:0 3px 10px rgba(20,50,79,.12)}
  .zoombar button{border:0;background:#f1f4f8;width:30px;height:30px;border-radius:7px;font-size:15px;font-weight:700;cursor:pointer;color:var(--ink)}
  .zoombar button:hover{background:#e4e9f0}
</style>
</head>
<body>
<header>
  <h1>Rushmore Van Lines</h1><span class="tag">PROJECT MAP</span>
  <div class="grow"></div>
  <div class="legend">
    <span><i class="dot done"></i>Done</span>
    <span><i class="dot doing"></i>Doing</span>
    <span><i class="dot todo"></i>To do</span>
  </div>
  <button class="hbtn" onclick="exportJSON()">⬇ Export</button>
  <button class="hbtn" onclick="document.getElementById('imp').click()">⬆ Import</button>
  <button class="hbtn" onclick="resetAll()">↺ Reset</button>
  <input id="imp" type="file" accept="application/json" style="display:none" onchange="importJSON(event)">
</header>

<div class="wrap">
  <div class="stage" id="stage">
    <div class="canvas" id="canvas"><svg class="edges" id="edges"></svg></div>
    <div class="zoombar"><button onclick="zoom(-1)">−</button><button onclick="zoom(0)">⌂</button><button onclick="zoom(1)">+</button></div>
  </div>
  <aside class="side">
    <div class="sidehd">
      <div class="t">WHERE WE'RE AT</div>
      <div class="ovbar"><i id="ovBar"></i></div>
      <div class="ovpct" id="ovPct">0%</div>
      <div class="nextup" id="nextUp"></div>
    </div>
    <div class="sidebody" id="sideBody"></div>
  </aside>
</div>

<script>
const DATA_VERSION='v6-2026-06-19a';
const KEY='rvl_opsmap_v6';
const CANVAS_W=1180, CANVAS_H=900;

const DEPTS={
  intake:{name:'Intake',color:'#2563eb',bg:'rgba(37,99,235,.05)'},
  dispatch:{name:'Dispatch',color:'#0d9488',bg:'rgba(13,148,136,.05)'},
  pickup:{name:'Pickup ops',color:'#7c3aed',bg:'rgba(124,58,237,.05)'},
  warehouse:{name:'Warehouse',color:'#b45309',bg:'rgba(180,83,9,.05)'},
  delivcs:{name:'Delivery support',color:'#db2777',bg:'rgba(219,39,119,.05)'},
  delivplan:{name:'Delivery planning',color:'#0284c7',bg:'rgba(2,132,199,.05)'},
  delivfield:{name:'Delivery ops',color:'#4f46e5',bg:'rgba(79,70,229,.05)'},
  escalation:{name:'Escalation',color:'#dc2626',bg:'rgba(220,38,38,.05)'},
  finance:{name:'Finance',color:'#059669',bg:'rgba(5,150,105,.06)'}
};

/* lifecycle stages (order = sidebar order). tasks drive status. */
const SEED=[
  {id:'estimate',dept:'intake',title:'Estimate intake',x:90,y:112,
   role:'Account / intake coordinator',sla:'Same day',
   tasks:[
     {t:'Dedicated intake email (estimates@)',s:'done'},
     {t:'Connect inbox for parsing',s:'done'},
     {t:'PDF estimate parser (AI extraction)',s:'doing'},
     {t:'Self-check: totals, math, required fields',s:'todo'},
     {t:'Auto-create job from parsed estimate',s:'todo'}
   ]},
  {id:'pickupsched',dept:'dispatch',title:'Schedule pickup & assign crew',x:365,y:112,
   role:'Pickup (dispatch) coordinator',sla:'≤24h after intake',
   tasks:[
     {t:'Create job from estimate',s:'done'},
     {t:'Sort / group board by pickup date',s:'done'},
     {t:'Assign foreman from roster',s:'done'},
     {t:'3-hour pickup window (ETA)',s:'done'},
     {t:'Short foreman link',s:'done'}
   ]},
  {id:'pickupops',dept:'pickup',title:'Pickup & BOL signing',x:640,y:112,
   role:'Foreman + pickup crew',sla:'Pickup day',
   tasks:[
     {t:'Foreman portal + dashboard',s:'done'},
     {t:'Fill BOL (full 5-form packet)',s:'done'},
     {t:'Inline multi-signature',s:'done'},
     {t:'Generate official CSI PDF',s:'done'}
   ]},
  {id:'pickupreport',dept:'pickup',title:'Pickup report',x:915,y:112,
   role:'Foreman',sla:'Same day as pickup',
   tasks:[
     {t:'Native in-app job report',s:'todo'},
     {t:'Mirror to Google Sheet backup',s:'todo'},
     {t:'Collected $, expenses, receipts, photos',s:'todo'},
     {t:'Feed totals to Job $',s:'todo'}
   ]},
  {id:'storage',dept:'warehouse',title:'Storage intake & custody',x:90,y:322,
   role:'Warehouse team',sla:'On arrival',
   tasks:[
     {t:'Storage intake & custody log',s:'todo'},
     {t:'Storage-in-transit tracking',s:'todo'}
   ]},
  {id:'fadd',dept:'delivcs',title:'FADD & address follow-up',x:365,y:322,
   role:'Delivery customer support',sla:'Within 48h of storage',
   tasks:[
     {t:'FADD + address follow-up workflow',s:'todo'},
     {t:'Log confirmation in CRM',s:'todo'}
   ]},
  {id:'preconfirm',dept:'delivcs',title:'Pre-delivery confirm call',x:640,y:322,
   role:'Delivery customer support',sla:'24–48h before delivery',
   tasks:[
     {t:'Confirmation call script + log',s:'todo'}
   ]},
  {id:'postconfirm',dept:'delivcs',title:'Post-delivery confirm call',x:915,y:322,
   role:'Delivery customer support',sla:'≤24h after delivery',
   tasks:[
     {t:'Satisfaction call + outcome capture',s:'todo'},
     {t:'Route concerns to escalation',s:'todo'}
   ]},
  {id:'delivsched',dept:'delivplan',title:'Schedule delivery & assign driver',x:90,y:532,
   role:'Delivery planner / coordinator',sla:'On FADD confirm',
   tasks:[
     {t:'Delivery board (clone dispatch)',s:'todo'},
     {t:'Assign driver from roster',s:'todo'}
   ]},
  {id:'coord',dept:'delivplan',title:'Driver coordination',x:365,y:532,
   role:'Delivery coordinator',sla:'Delivery day',
   tasks:[
     {t:'Driver coordination (ETA / load / paperwork)',s:'todo'}
   ]},
  {id:'delivops',dept:'delivfield',title:'Delivery, POD & payment',x:640,y:532,
   role:'Driver + delivery crew',sla:'Delivery day',
   tasks:[
     {t:'Driver portal + delivery view',s:'todo'},
     {t:'Sign POD with customer',s:'todo'},
     {t:'Collect final payment',s:'todo'}
   ]},
  {id:'escalation',dept:'escalation',title:'Escalation & resolution',x:915,y:532,
   role:'Escalation / resolution team',sla:'≤24h first response',
   tasks:[
     {t:'Escalation queue + ticketing',s:'todo'},
     {t:'Resolution tracking (claim / credit / redo)',s:'todo'}
   ]},
  {id:'finance',dept:'finance',title:'Job reconciliation',x:90,y:742,
   role:'Bookkeeper',sla:'≤72h after delivery',
   tasks:[
     {t:'Per-job payout calculator (mixed)',s:'todo'},
     {t:'Expense roll-up + profit',s:'todo'},
     {t:'Bookkeeper review / approve',s:'todo'}
   ]},
  {id:'payroll',dept:'finance',title:'Payroll & accounting',x:365,y:742,
   role:'Finance / accounting',sla:'Weekly',
   tasks:[
     {t:'Payroll run',s:'todo'},
     {t:'Accounting export',s:'todo'}
   ]}
];

const EDGES=[
  {f:'estimate',t:'pickupsched'},{f:'pickupsched',t:'pickupops'},{f:'pickupops',t:'pickupreport'},
  {f:'pickupreport',t:'storage'},{f:'storage',t:'fadd'},{f:'fadd',t:'delivsched'},
  {f:'delivsched',t:'preconfirm'},{f:'preconfirm',t:'coord'},{f:'coord',t:'delivops'},
  {f:'delivops',t:'postconfirm'},
  {f:'postconfirm',t:'escalation',style:'escalate',label:'if concerns'},
  {f:'pickupreport',t:'finance',style:'money',label:'$'},
  {f:'delivops',t:'finance',style:'money',label:'$'},
  {f:'finance',t:'payroll'}
];

let NODES=[], scale=1, openSet=new Set(), selId=null;

/* persistence (version-gated so redeploys with new content win) */
function load(){
  NODES=JSON.parse(JSON.stringify(SEED));
  let saved=null;
  try{saved=JSON.parse(localStorage.getItem(KEY)||'null');}catch(e){}
  if(saved&&saved.v===DATA_VERSION){
    NODES.forEach(n=>{
      const o=saved.nodes&&saved.nodes[n.id];
      if(o){ if(o.x!=null)n.x=o.x; if(o.y!=null)n.y=o.y;
        if(o.tasks)n.tasks=o.tasks; }
    });
  }
}
function save(){
  const nodes={};
  NODES.forEach(n=>nodes[n.id]={x:n.x,y:n.y,tasks:n.tasks});
  localStorage.setItem(KEY,JSON.stringify({v:DATA_VERSION,nodes}));
}

/* status from tasks */
function stepStatus(n){
  if(!n.tasks.length)return 'todo';
  const d=n.tasks.filter(t=>t.s==='done').length;
  const g=n.tasks.filter(t=>t.s==='doing').length;
  if(d===n.tasks.length)return 'done';
  if(d>0||g>0)return 'doing';
  return 'todo';
}
function stepPct(n){
  if(!n.tasks.length)return 0;
  const sc=n.tasks.reduce((a,t)=>a+(t.s==='done'?1:t.s==='doing'?0.5:0),0);
  return Math.round(100*sc/n.tasks.length);
}
function doneCount(n){return n.tasks.filter(t=>t.s==='done').length;}

/* ---------- map render ---------- */
const canvas=document.getElementById('canvas');
const edgesSvg=document.getElementById('edges');
function nodeById(id){return NODES.find(n=>n.id===id);}
function dimW(n){return n._w||215;}
function dimH(n){return n._h||92;}
function renderMap(){
  canvas.style.width=CANVAS_W+'px';canvas.style.height=CANVAS_H+'px';
  edgesSvg.setAttribute('width',CANVAS_W);edgesSvg.setAttribute('height',CANVAS_H);
  document.querySelectorAll('.node,.zone').forEach(e=>e.remove());
  NODES.forEach(n=>{
    const st=stepStatus(n),pct=stepPct(n),d=DEPTS[n.dept];
    const el=document.createElement('div');
    el.className='node s-'+st+(selId===n.id?' hl':'');el.dataset.id=n.id;
    el.style.left=n.x+'px';el.style.top=n.y+'px';
    el.innerHTML='<div class="ntitle"><span class="sdot '+st+'"></span><span>'+esc(n.title)+'</span></div>'+
      '<div class="ndept" style="color:'+d.color+'">'+d.name.toUpperCase()+'</div>'+
      '<div class="nprog">'+doneCount(n)+'/'+n.tasks.length+'<span class="pbar"><i style="width:'+pct+'%"></i></span></div>';
    attachDrag(el,n);
    canvas.appendChild(el);
    n._w=el.offsetWidth;n._h=el.offsetHeight;
  });
  renderZones();drawEdges();
}
function renderZones(){
  document.querySelectorAll('.zone').forEach(e=>e.remove());
  Object.keys(DEPTS).forEach(key=>{
    const mem=NODES.filter(n=>n.dept===key);if(!mem.length)return;
    const d=DEPTS[key];let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
    mem.forEach(n=>{minX=Math.min(minX,n.x);minY=Math.min(minY,n.y);maxX=Math.max(maxX,n.x+dimW(n));maxY=Math.max(maxY,n.y+dimH(n));});
    const px=18,pt=30,pb=16;
    const el=document.createElement('div');el.className='zone';
    el.style.left=(minX-px)+'px';el.style.top=(minY-pt)+'px';
    el.style.width=(maxX-minX+px*2)+'px';el.style.height=(maxY-minY+pt+pb)+'px';
    el.style.borderColor=d.color;el.style.background=d.bg;
    el.innerHTML='<span class="zlabel" style="background:'+d.color+'">'+esc(d.name)+'</span>';
    canvas.appendChild(el);
  });
}
function borderPoint(n,tx,ty){
  const w=dimW(n),h=dimH(n),cx=n.x+w/2,cy=n.y+h/2,dx=tx-cx,dy=ty-cy;
  if(!dx&&!dy)return{x:cx,y:cy};
  const sx=dx?(w/2)/Math.abs(dx):Infinity,sy=dy?(h/2)/Math.abs(dy):Infinity,s=Math.min(sx,sy);
  return{x:cx+dx*s,y:cy+dy*s};
}
function drawEdges(){
  let m='<defs><marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#7d90a3"/></marker>'+
        '<marker id="ahr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/></marker></defs>';
  EDGES.forEach(e=>{
    const a=nodeById(e.f),b=nodeById(e.t);
    const p1=borderPoint(a,b.x+dimW(b)/2,b.y+dimH(b)/2),p2=borderPoint(b,a.x+dimW(a)/2,a.y+dimH(a)/2);
    let stroke='#9fb0c2',dash='',mk='ah',tc='#6f7d8c';
    if(e.style==='money'){stroke='#6bbb97';dash='stroke-dasharray="6 5"';tc='#3f8a66';}
    if(e.style==='escalate'){stroke='#e0726f';dash='stroke-dasharray="6 5"';mk='ahr';tc='#dc2626';}
    m+='<path d="M'+p1.x+','+p1.y+' L'+p2.x+','+p2.y+'" fill="none" stroke="'+stroke+'" stroke-width="2.3" '+dash+' marker-end="url(#'+mk+')"/>';
    if(e.label){const mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2;m+='<text x="'+(mx+7)+'" y="'+(my-4)+'" fill="'+tc+'">'+esc(e.label)+'</text>';}
  });
  edgesSvg.innerHTML=m;
}

/* drag + click */
function attachDrag(el,n){
  let sx,sy,ox,oy,moved,drag=false;
  el.addEventListener('pointerdown',ev=>{if(ev.button!==0)return;drag=true;moved=false;sx=ev.clientX;sy=ev.clientY;ox=n.x;oy=n.y;el.setPointerCapture(ev.pointerId);el.classList.add('dragging');});
  el.addEventListener('pointermove',ev=>{if(!drag)return;const dx=(ev.clientX-sx)/scale,dy=(ev.clientY-sy)/scale;if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;n.x=Math.max(0,Math.round(ox+dx));n.y=Math.max(0,Math.round(oy+dy));el.style.left=n.x+'px';el.style.top=n.y+'px';renderZones();drawEdges();});
  el.addEventListener('pointerup',ev=>{drag=false;el.classList.remove('dragging');if(moved){save();}else{selectStep(n.id,true);}});
}

/* ---------- sidebar ---------- */
function renderSide(){
  // overall
  let sc=0,tot=0;
  NODES.forEach(n=>n.tasks.forEach(t=>{tot++;sc+=t.s==='done'?1:t.s==='doing'?0.5:0;}));
  const pct=tot?Math.round(100*sc/tot):0;
  document.getElementById('ovBar').style.width=pct+'%';
  document.getElementById('ovPct').textContent=pct+'% · '+Math.round(sc)+' of '+tot+' tasks';
  // next up: first doing, else first todo
  let nx=null,nxStep=null;
  for(const n of NODES){const t=n.tasks.find(t=>t.s==='doing'); if(t){nx=t;nxStep=n;break;}}
  if(!nx)for(const n of NODES){const t=n.tasks.find(t=>t.s==='todo'); if(t){nx=t;nxStep=n;break;}}
  document.getElementById('nextUp').innerHTML = nx
    ? '▶ <b>Next up:</b> '+esc(nx.t)+'<span class="ns">in '+esc(nxStep.title)+'</span>'
    : '🎉 Everything is done!';
  // steps
  const body=document.getElementById('sideBody');
  body.innerHTML=NODES.map(n=>{
    const st=stepStatus(n),d=DEPTS[n.dept],open=openSet.has(n.id);
    const tasks=n.tasks.map((t,i)=>
      '<div class="task '+(t.s==='done'?'tdone':'')+'"><button class="tk '+t.s+'" title="cycle status" onclick="cycleTask(event,\''+n.id+'\','+i+')"></button>'+
      '<span class="tt">'+esc(t.t)+'</span><button class="del" title="remove" onclick="delTask(event,\''+n.id+'\','+i+')">×</button></div>').join('');
    return '<div class="step '+(open?'open ':'')+(selId===n.id?'cur':'')+'" id="step_'+n.id+'">'+
      '<div class="stephd" onclick="selectStep(\''+n.id+'\',false)"><span class="sdot '+st+'"></span>'+
        '<span class="stt">'+esc(n.title)+'</span><span class="scount">'+doneCount(n)+'/'+n.tasks.length+'</span><span class="chev">▶</span></div>'+
      '<div class="steptasks"><div class="smeta" style="border-left:3px solid '+d.color+';padding-left:8px"><b>'+esc(d.name)+'</b> · '+esc(n.role)+' · ⏱ '+esc(n.sla)+'</div>'+
        tasks+
        '<div class="addt"><input placeholder="Add a task…" onkeydown="if(event.key===\'Enter\')addTask(\''+n.id+'\',this)"><button onclick="addTask(\''+n.id+'\',this.previousElementSibling)">+</button></div>'+
      '</div></div>';
  }).join('');
}
function selectStep(id,fromMap){
  selId=id;
  if(openSet.has(id)&&!fromMap){openSet.delete(id);} else {openSet.add(id);}
  renderMap();renderSide();
  const el=document.getElementById('step_'+id);
  if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function cycleTask(ev,id,i){ev.stopPropagation();const n=nodeById(id);const o={todo:'doing',doing:'done',done:'todo'};n.tasks[i].s=o[n.tasks[i].s];save();renderMap();renderSide();}
function delTask(ev,id,i){ev.stopPropagation();const n=nodeById(id);n.tasks.splice(i,1);save();renderMap();renderSide();}
function addTask(id,inp){const v=inp.value.trim();if(!v)return;openSet.add(id);nodeById(id).tasks.push({t:v,s:'todo'});inp.value='';save();renderMap();renderSide();}

/* zoom */
function zoom(d){if(d===0)scale=1;else scale=Math.min(1.4,Math.max(.5,scale+d*0.1));canvas.style.transform='scale('+scale+')';}

/* export / import / reset */
function exportJSON(){const nodes={};NODES.forEach(n=>nodes[n.id]={x:n.x,y:n.y,tasks:n.tasks});
  const blob=new Blob([JSON.stringify({v:DATA_VERSION,nodes},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rushmore-project-map.json';a.click();}
function importJSON(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{localStorage.setItem(KEY,r.result);load();renderMap();renderSide();alert('Imported.');}catch(e){alert('Could not read that file.');}};
  r.readAsText(f);ev.target.value='';}
function resetAll(){if(confirm('Reset the map to the latest default? Your local task ticks will be cleared.')){localStorage.removeItem(KEY);load();renderMap();renderSide();}}

/* util */
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

load();renderMap();
// auto-expand the current (first not-done) step
(function(){const cur=NODES.find(n=>stepStatus(n)!=='done')||NODES[0];if(cur){selId=cur.id;openSet.add(cur.id);}})();
renderSide();
// fit map to available width
(function(){const aw=document.getElementById('stage').clientWidth;const s=(aw-24)/CANVAS_W;scale=Math.min(1,Math.max(.5,s));canvas.style.transform='scale('+scale+')';})();
</script>
</body>
</html>
